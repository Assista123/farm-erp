{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Farm ERP{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="{% static 'core/css/main.css' %}">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-success px-3 fixed-top">
    <div class="d-flex align-items-center">
        <button class="navbar-toggler me-2 d-md-none" type="button" id="sidebarToggle">
            <span class="navbar-toggler-icon"></span>
        </button>

        <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">
            <i class="bi bi-house-fill"></i> Farm ERP
        </a>
    </div>

    <div class="d-flex align-items-center text-white">
        <span class="me-3 d-none d-md-inline">
            <i class="bi bi-person-circle"></i>
            {{ request.user.worker_profile.full_name|default:request.user.username }}
        </span>
        <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
</nav>

<!-- OVERLAY -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- LAYOUT -->
<div class="app-layout">

    <!-- SIDEBAR -->
    <nav class="sidebar bg-light py-3" id="sidebar">
        <ul class="nav flex-column">

            <li class="nav-item mb-1">
                <a class="nav-link text-dark fw-bold" href="{% url 'dashboard' %}">
                    <i class="bi bi-speedometer2"></i> Dashboard
                </a>
            </li>

            <!-- Keep the rest of your sidebar items here -->

        </ul>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="main-content px-4 py-4">

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}

    </main>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Sidebar Toggle Script -->
<script>
document.addEventListener('DOMContentLoaded', function () {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const toggleBtn = document.getElementById('sidebarToggle');

    function openSidebar() {
        sidebar.classList.add('mobile-open');
        overlay.classList.add('mobile-open');
    }

    function closeSidebar() {
        sidebar.classList.remove('mobile-open');
        overlay.classList.remove('mobile-open');
    }

    toggleBtn.addEventListener('click', function () {
        sidebar.classList.contains('mobile-open') ? closeSidebar() : openSidebar();
    });

    overlay.addEventListener('click', closeSidebar);
});
</script>

</body>
</html>
