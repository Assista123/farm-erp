<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Farm ERP{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'core/css/main.css' %}">
</head>
<body>

<!-- TOP NAVBAR -->
<nav class="navbar navbar-dark bg-success px-3">
    <div class="d-flex align-items-center">
        <button class="navbar-toggler d-md-none me-3" type="button"
                data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">
            <i class="bi bi-house-fill"></i> Farm ERP
        </a>
    </div>
    <div class="d-flex align-items-center text-white">
        <span class="me-3"><i class="bi bi-person-circle"></i> {{ request.user.username }}</span>
        <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- DESKTOP SIDEBAR -->
        <nav class="col-md-2 d-none d-md-block bg-light sidebar py-3 min-vh-100">
            <ul class="nav flex-column">

                <li class="nav-item mb-1">
                    <a class="nav-link text-dark fw-bold" href="{% url 'dashboard' %}">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>

                {% if not is_salesperson %}

                <!-- FARM SETUP -->
                <li class="nav-item">
                    <a class="nav-link text-dark fw-semibold d-flex justify-content-between"
                       data-bs-toggle="collapse" href="#farmSetup" role="button">
                        <span><i class="bi bi-building"></i> Farm Setup</span>
                        <i class="bi bi-chevron-down small"></i>
                    </a>
                    <div class="collapse" id="farmSetup">
                        <ul class="nav flex-column ms-3">
                            <li class="nav-item">
                                <a class="nav-link text-dark" href="{% url 'farmunit-list' %}">Farm Units</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link text-dark" href="{% url 'pen-list' %}">Pens</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link text-dark" href="{% url 'flock-list' %}">Flocks</a>
